{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Setup – Create Admin" %}{% endblock %}
{% block content %}
<div class="content" style="max-width: 480px; margin: 40px auto;">
    <h2 style="text-align:center; color:var(--ctp-mauve); margin-bottom:8px;">{% trans "Welcome to trackable." %}</h2>
    <p style="text-align:center; color:var(--ctp-subtext0); margin-bottom:30px;">
        {% trans "Let's set up your instance. First, create the admin account." %}
    </p>
    <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">{% trans "Username" %}</label>
            <input type="text" name="username" id="id_username" required
                   style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--ctp-overlay0); background:var(--ctp-mantle); color:var(--ctp-text);">
        </div>
        <div class="form-group">
            <label for="id_email">{% trans "Email" %}</label>
            <input type="email" name="email" id="id_email" required
                   style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--ctp-overlay0); background:var(--ctp-mantle); color:var(--ctp-text);">
        </div>
        <div class="form-group">
            <label for="id_password">{% trans "Password" %}</label>
            <input type="password" name="password" id="id_password" required
                   style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--ctp-overlay0); background:var(--ctp-mantle); color:var(--ctp-text);">
        </div>
        <div class="form-group">
            <label for="id_password_confirm">{% trans "Confirm password" %}</label>
            <input type="password" name="password_confirm" id="id_password_confirm" required
                   style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--ctp-overlay0); background:var(--ctp-mantle); color:var(--ctp-text);">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-form-submit" style="margin-top:10px;">
            {% trans "Create admin account" %}
        </button>
    </form>
</div>
{% endblock %}
