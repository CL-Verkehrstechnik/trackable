{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Reset password" %}{% endblock %}

{% block content %}
<div class="content" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--ctp-mauve);">{% trans "New password" %}</h2>
    <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <label for="password">{% trans "New password" %}</label>
            <input type="password" name="password" id="password" required minlength="8"
                   autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="password_confirm">{% trans "Confirm password" %}</label>
            <input type="password" name="password_confirm" id="password_confirm" required minlength="8"
                   autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-form-submit">{% trans "Change password" %}</button>
    </form>
</div>
{% endblock %}
