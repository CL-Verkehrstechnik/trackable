{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Reset password" %}{% endblock %}

{% block content %}
<div class="content" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--ctp-mauve);">{% trans "Reset password" %}</h2>
    <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <label for="email">{% trans "E-Mail" %}</label>
            <input type="email" name="email" id="email" required placeholder="your@email.com"
                   autocomplete="email" inputmode="email">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-form-submit">{% trans "Send reset link" %}</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a href="/accounts/login/">{% trans "Back to login" %}</a>
    </p>
</div>
{% endblock %}
